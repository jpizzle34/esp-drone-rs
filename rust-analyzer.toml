# When opening the repo root (Co-Create_ESP-FLY/), point rust-analyzer at the firmware crate.
linkedProjects = ["Firmware/esp-drone-rs/Cargo.toml"]

[cargo]
target = "xtensa-esp32-espidf"
extraArgs = ["-Zbuild-std=std,panic_abort"]

[cargo.extraEnv]
RUSTUP_TOOLCHAIN = "esp"
MCU = "esp32"
ESP_IDF_VERSION = "v5.5.3"
ESP_IDF_TOOLS_INSTALL_DIR = "workspace"

[checkOnSave]
allTargets = false
