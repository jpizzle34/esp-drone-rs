[build]
target = "xtensa-esp32-espidf"

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32"
ESP_IDF_VERSION = "v5.5.3"
ESP_IDF_TOOLS_INSTALL_DIR = "workspace"
# Workspace has no root package; point esp-idf-sys at our firmware crate + its sdkconfig.
ESP_IDF_SYS_ROOT_CRATE = "esp-drone-rs"
ESP_IDF_SDKCONFIG_DEFAULTS = { value = "Firmware/esp-drone-rs/sdkconfig.defaults", relative = true }
